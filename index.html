<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ميزانيتي</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ميزانيتي">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #161a26;
    --card: #1f2438;
    --border: #373f5e;
    --accent: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #ffffff;      /* تم رفع التباين لأقصى حد للقراءة المريحة */
    --muted: #a3b1cc;     /* تم تفتيح لون النصوص الثانوية لنجاح الفحص الأمني للتباين */
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
    -webkit-tap-highlight-color: transparent;
  }

  h1 { font-size: 1.8rem; font-weight: 900; text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; transition: color 0.3s; }

  .balances { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .bal-card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px 16px; text-align: center; position: relative; transition: border-color 0.2s; }
  .bal-card:focus-within { border-color: var(--accent); }
  .bal-card .label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  
  /* حل مشكلة قلب الأرقام بالـ CSS */
  .bal-card .amount { font-size: 1.65rem; font-weight: 900; direction: ltr; display: inline-block; }
  .bal-card .currency { font-size: 0.8rem; color: var(--muted); margin-top: 4px; font-weight: bold; }
  .bal-card.cash .amount { color: var(--yellow); }
  .bal-card.ccp .amount  { color: var(--accent); }
  
  /* تحسين حجم الأزرار للموبايل لسهولة الضغط */
  .bal-card .edit-bal { position: absolute; top: 10px; left: 10px; background: var(--border); border: none; color: var(--text); cursor: pointer; font-size: 0.9rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
  .bal-card .edit-bal:hover { background: var(--accent); }

  .total-card { background: linear-gradient(135deg, #172544 0%, #1f2438 100%); border: 2px solid var(--accent); border-radius: var(--radius); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .total-card .tl { font-size: 0.95rem; color: var(--muted); font-weight: 600; }
  .total-card .tv { font-size: 1.8rem; font-weight: 900; color: #60a5fa; direction: ltr; display: inline-block; }

  .form-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 28px; }
  .form-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--text); letter-spacing: 0.5px; }

  .form-row { display: flex; gap: 12px; margin-bottom: 14px; }
  .form-row.triple { grid-template-columns: 1.2fr 1fr 1.2fr; display: grid; }

  /* تكبير حقول الإدخال لتسهيل الكتابة من الهاتف */
  input, select { width: 100%; background: var(--card); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 1rem; padding: 14px 16px; outline: none; transition: all 0.2s; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); background: #242b42; }
  input::placeholder { color: #7685a9; }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .type-btn { padding: 14px; border-radius: 12px; border: 2px solid var(--border); background: var(--card); color: var(--muted); font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .type-btn.active-expense { background: #4c1d1d; border-color: var(--red); color: #fca5a5; }
  .type-btn.active-income  { background: #064e3b; border-color: var(--green); color: #6ee7b7; }

  .submit-btn { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-family: 'Cairo', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 6px; transition: background 0.2s; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
  .submit-btn:hover { background: #2563eb; }

  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .section-title { font-size: 1rem; font-weight: 700; }
  .clear-btn { background: none; border: 2px solid var(--border); color: var(--muted); font-family: 'Cairo', sans-serif; font-size: 0.85rem; padding: 6px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .clear-btn:hover { border-color: var(--red); color: var(--red); background: #4c1d1d; }

  .tx-list { display: flex; flex-direction: column; gap: 10px; }
  .tx-item { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

  .tx-left { display: flex; flex-direction: column; gap: 4px; }
  .tx-desc { font-size: 1rem; font-weight: 700; }
  .tx-meta { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
  .tx-right { display: flex; align-items: center; gap: 12px; }
  .tx-amount { font-size: 1.1rem; font-weight: 700; direction: ltr; display: inline-block; }
  .tx-amount.income  { color: #34d399; }
  .tx-amount.expense { color: #f87171; }
  
  .tx-btn { background: var(--border); border: none; color: var(--text); cursor: pointer; font-size: 1rem; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
  .tx-btn.edit:hover { background: var(--accent); }
  .tx-btn.del:hover { color: var(--red); background: #4c1d1d; }

  .empty-msg { text-align: center; color: var(--muted); font-size: 0.95rem; padding: 36px 0; }

  /* شاشة الإعدادات الأولى المخصصة للأصدقاء */
  .setup-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 999; padding: 40px 24px; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .setup-screen h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 12px; }
  .setup-screen p { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.6; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 28px; width: 90%; max-width: 340px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  .modal h3 { margin-bottom: 16px; font-size: 1.1rem; text-align: center; }
  .modal-btns { display: flex; gap: 12px; margin-top: 20px; }
  .modal-btns button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: var(--surface); color: var(--muted); border: 2px solid var(--border); }
  .btn-save   { background: var(--accent); color: #fff; }
</style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
  <h2>أهلاً بك في ميزانيتي 💰</h2>
  <p>لتفعيل نسختك السحابية الخاصة، يرجى لصق رابط (Web App URL) المستخرج من كود Google Sheets الخاص بك أدناه:</p>
  <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec" style="margin-bottom: 20px;" />
  <button class="submit-btn" onclick="saveScriptUrl()">🚀 حفظ ورط الجدول</button>
</div>

<div class="app-container">
  <h1>💰 ميزانيتي</h1>
  <p class="subtitle" id="statusText">تتبع بسيط — كاش + CCP</p>

  <div class="balances">
    <div class="bal-card cash">
      <button class="edit-bal" onclick="openModal('cash')">✏️</button>
      <div class="label">كاش</div>
      <div class="amount" id="cashBal">0</div>
      <div class="currency">دج</div>
    </div>
    <div class="bal-card ccp">
      <button class="edit-bal" onclick="openModal('ccp')">✏️</button>
      <div class="label">CCP</div>
      <div class="amount" id="ccpBal">0</div>
      <div class="currency">دج</div>
    </div>
  </div>

  <div class="total-card">
    <div class="tl">المجموع الكلي</div>
    <div class="tv"><span id="totalBal">0</span> دج</div>
  </div>

  <div class="form-card">
    <div class="form-title" id="formActionTitle">إضافة حركة جديد</div>
    <div class="type-toggle">
      <button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">🔴 مصروف</button>
      <button class="type-btn" id="btnIncome"  onclick="setType('income')">🟢 دخل</button>
    </div>
    <div class="form-row">
      <input type="text" id="descInput" placeholder="وصف الحركية (أكل، نقل، شحن…)" />
    </div>
    <div class="form-row triple">
      <input type="number" id="amountInput" placeholder="المبلغ" min="0" />
      <select id="walletSelect">
        <option value="cash">كاش</option>
        <option value="ccp">CCP</option>
      </select>
      <input type="date" id="dateInput" />
    </div>
    <button class="submit-btn" id="btnSubmitForm" onclick="addTransaction()">✅ إضافة</button>
  </div>

  <div class="section-header">
    <div class="section-title">📋 الحركات الحالية</div>
    <button class="clear-btn" onclick="clearAll()">مسح الكل</button>
  </div>
  <div class="tx-list" id="txList">
    <div class="empty-msg">لا توجد حركات بعد — أضف أول واحدة 👆</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">تعديل الرصيد الأساسي</h3>
    <input type="number" id="modalInput" placeholder="الرصيد الجديد (دج)" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn-save"   onclick="saveBalance()">حفظ الرصيد</button>
    </div>
  </div>
</div>

<script>
  let state = { cash: 0, ccp: 0, transactions: [], currentType: 'expense' };
  let editingTxId = null;

  function load() {
    const saved = localStorage.getItem('mizania_v2');
    if (saved) state = JSON.parse(saved);
    document.getElementById('dateInput').valueAsDate = new Date();
    render();
    
    // فحص إذا كان التطبيق يفتح لأول مرة لإظهار شاشة الإعداد
    const savedUrl = localStorage.getItem('scriptUrl');
    if (!savedUrl) {
      document.getElementById('setupScreen').style.display = 'flex';
    } else {
      sendOfflineQueue();
    }
  }

  function saveScriptUrl() {
    const url = document.getElementById('scriptUrlInput').value.trim();
    if (url.startsWith('https://script.google.com/')) {
      localStorage.setItem('scriptUrl', url);
      document.getElementById('setupScreen').style.display = 'none';
      sendOfflineQueue();
    } else {
      alert('الرجاء إدخال رابط إكسكيوتر صحيح مأخوذ من نص الويب الخاص بجوجل سكريبت');
    }
  }

  function save() { localStorage.setItem('mizania_v2', JSON.stringify(state)); }

  function sendDataToSheets(amount, description, type) {
    const url = localStorage.getItem('scriptUrl');
    if (!url) return;

    const payload = { amount, description, type };

    if (!navigator.onLine) {
      saveToOfflineQueue(payload);
      updateStatusNotification(true);
      return;
    }

    fetch(url, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(e => {
      saveToOfflineQueue(payload);
      updateStatusNotification(true);
    });
  }

  function saveToOfflineQueue(payload) {
    let queue = JSON.parse(localStorage.getItem('mizania_offline_queue')) || [];
    queue.push(payload);
    localStorage.setItem('mizania_offline_queue', JSON.stringify(queue));
  }

  function sendOfflineQueue() {
    if (!navigator.onLine) return;
    const url = localStorage.getItem('scriptUrl');
    if (!url) return;

    let queue = JSON.parse(localStorage.getItem('mizania_offline_queue')) || [];
    if (queue.length === 0) return;

    document.getElementById('statusText').textContent = '⏳ جاري مزامنة العمليات السابقة مع السحابة...';

    let promises = queue.map(payload => {
      return fetch(url, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    });

    Promise.all(promises)
      .then(() => {
        localStorage.removeItem('mizania_offline_queue');
        updateStatusNotification(false);
        alert('تمت مزامنة كافة العمليات بنجاح مع جدولك الخاص! 🎉');
      })
      .catch(err => console.error(err));
  }

  function updateStatusNotification(isOffline) {
    const txt = document.getElementById('statusText');
    if (isOffline) {
      txt.textContent = '⚠️ تعمل أوفلاين (سيتم حفظ البيانات محلياً والمزامنة لاحقاً)';
      txt.style.color = 'var(--yellow)';
    } else {
      txt.textContent = 'تتبع بسيط — كاش + CCP';
      txt.style.color = 'var(--muted)';
    }
  }

  window.addEventListener('online', sendOfflineQueue);
  window.addEventListener('offline', () => updateStatusNotification(true));

  function setType(t) {
    state.currentType = t;
    document.getElementById('btnExpense').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
    document.getElementById('btnIncome').className  = 'type-btn' + (t === 'income'  ? ' active-income'  : '');
  }

  function addTransaction() {
    const desc   = document.getElementById('descInput').value.trim();
    const amount = parseFloat(document.getElementById('amountInput').value);
    const wallet = document.getElementById('walletSelect').value;
    const date   = document.getElementById('dateInput').value;
    if (!desc || isNaN(amount) || amount <= 0) { alert('يرجى ملأ حقول الوصف والمبلغ بشكل صحيح'); return; }

    const sign = state.currentType === 'expense' ? -1 : 1;

    if (editingTxId !== null) {
      const txIndex = state.transactions.findIndex(t => t.id === editingTxId);
      if (txIndex !== -1) {
        const oldTx = state.transactions[txIndex];
        const oldSign = oldTx.type === 'expense' ? -1 : 1;
        state[oldTx.wallet] -= oldSign * oldTx.amount;

        state.transactions[txIndex] = { id: editingTxId, desc, amount, wallet, date, type: state.currentType };
        state[wallet] += sign * amount;

        sendDataToSheets(sign * amount, `تعديل حركية: ${desc}`, `${wallet === 'cash' ? 'كاش' : 'CCP'} (${state.currentType === 'income' ? 'دخل' : 'مصروف'})`);
      }
      editingTxId = null;
      const submitBtn = document.getElementById('btnSubmitForm');
      submitBtn.textContent = '✅ إضافة';
      submitBtn.style.background = 'var(--accent)';
      document.getElementById('formActionTitle').textContent = 'إضافة حركة جديد';
    } else {
      state[wallet] += sign * amount;
      state.transactions.unshift({ id: Date.now(), desc, amount, wallet, date, type: state.currentType });
      
      const walletLabel = wallet === 'cash' ? 'كاش' : 'CCP';
      const typeLabel   = state.currentType === 'income' ? 'دخل' : 'مصروف';
      sendDataToSheets(sign * amount, desc, walletLabel + ' (' + typeLabel + ')');
    }

    save(); render();
    document.getElementById('descInput').value = '';
    document.getElementById('amountInput').value = '';
    document.getElementById('dateInput').valueAsDate = new Date();
  }

  function editTransaction(id) {
    const tx = state.transactions.find(t => t.id === id);
    if (!tx) return;

    document.getElementById('descInput').value = tx.desc;
    document.getElementById('amountInput').value = tx.amount;
    document.getElementById('walletSelect').value = tx.wallet;
    document.getElementById('dateInput').value = tx.date;
    setType(tx.type);

    const submitBtn = document.getElementById('btnSubmitForm');
    submitBtn.textContent = '💾 حفظ التعديل المالي';
    submitBtn.style.background = 'var(--green)';
    document.getElementById('formActionTitle').textContent = 'تعديل الحركة الحالية ✏️';
    
    editingTxId = id;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteTransaction(id) {
    if(!confirm('هل أنت متأكد من رغبتك في حذف هذه الحركة؟')) return;
    const tx = state.transactions.find(t => t.id === id);
    if (!tx) return;
    const sign = tx.type === 'expense' ? 1 : -1;
    state[tx.wallet] += sign * tx.amount;
    state.transactions = state.transactions.filter(t => t.id !== id);
    save(); render();
    sendDataToSheets(-sign * tx.amount, 'حذف حركة: ' + tx.desc, tx.wallet === 'cash' ? 'كاش' : 'CCP');
  }

  function clearAll() {
    if (!confirm('تنبيه: مسح كل الحركات المسجلة؟ الأرصدة الحالية ستبقى ثابتة.')) return;
    state.transactions = [];
    save(); render();
    sendDataToSheets(0, 'تصفير شامل للحركات المسجلة', 'تنبيه');
  }

  let editingWallet = null;
  function openModal(w) {
    editingWallet = w;
    document.getElementById('modalTitle').textContent = w === 'cash' ? 'تعديل رصيد الكاش يدويّاً' : 'تعديل رصيد CCP يدويّاً';
    document.getElementById('modalInput').value = state[w];
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalInput').focus();
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingWallet = null; }
  function saveBalance() {
    const val = parseFloat(document.getElementById('modalInput').value);
    if (isNaN(val)) return;
    const diff = val - state[editingWallet];
    state[editingWallet] = val;
    save(); render(); closeModal();
    sendDataToSheets(diff, 'تعديل رصيد يدوي مباشر', editingWallet === 'cash' ? 'كاش' : 'CCP');
  }

  function render() {
    // دالة التنسيق العبقرية لإضافة الفراغات للآلاف مع منع قلب الأرقام نهائياً
    const fmt = n => {
      const parts = n.toString().split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ");
      return parts.join('.');
    };

    document.getElementById('cashBal').textContent  = fmt(state.cash);
    document.getElementById('ccpBal').textContent   = fmt(state.ccp);
    document.getElementById('totalBal').textContent = fmt(state.cash + state.ccp);
    const list = document.getElementById('txList');
    
    if (state.transactions.length === 0) {
      list.innerHTML = '<div class="empty-msg">لا توجد حركات مسجلة حالياً بعد — أضف حركة جديدة 👆</div>';
      return;
    }
    
    list.innerHTML = state.transactions.map(tx => {
      const sign   = tx.type === 'income' ? '+' : '-';
      const cls    = tx.type;
      const wallet = tx.wallet === 'cash' ? '💵 كاش' : '🏦 CCP';
      const d      = tx.date ? new Date(tx.date).toLocaleDateString('ar-DZ') : '';
      return `<div class="tx-item">
        <div class="tx-left">
          <div class="tx-desc">${tx.desc}</div>
          <div class="tx-meta">${wallet} · ${d}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amount ${cls}">${sign}${fmt(tx.amount)} دج</div>
          <button class="tx-btn edit" onclick="editTransaction(${tx.id})">✏️</button>
          <button class="tx-btn del" onclick="deleteTransaction(${tx.id})">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveBalance();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW Active'))
      .catch(e => console.log('SW Error:', e));
  }

  load();
</script>
</body>
</html>
